services:
  postgres:
    image: postgres:15-alpine
    container_name: oxfin-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oxfin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oxfin_pass}
      POSTGRES_DB: ${POSTGRES_DB:-oxfin}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER:-oxfin_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oxfin-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
